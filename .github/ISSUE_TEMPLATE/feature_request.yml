name: Feature request
description: Suggest a new command or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow pain point.
      placeholder: Writing issue replies for repeated triage situations takes time.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the command, output, or behavior you want.
      placeholder: Add a command that drafts release note summaries from bullet points.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Optional examples, links, or screenshots.

